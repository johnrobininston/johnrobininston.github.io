<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Second brain graph</title>
  <desc>An Obsidian-style connected node graph representing a second brain knowledge network, with a central hub labeled Brain.</desc>
  <defs>
    <style>
      .pulse  { animation: glow 3s ease-in-out infinite; }
      .pulse2 { animation: glow 3s ease-in-out infinite 1s; }
      .pulse3 { animation: glow 3s ease-in-out infinite 2s; }
      @keyframes glow {
        0%,100% { opacity: 0.35; }
        50%      { opacity: 1; }
      }
      .edge { stroke-linecap: round; }
      .flow  { animation: dash 5s linear infinite; }
      .flow2 { animation: dash 5s linear infinite 1.7s; }
      .flow3 { animation: dash 5s linear infinite 3.2s; }
      @keyframes dash {
        from { stroke-dashoffset: 120; }
        to   { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- static edges -->
  <line class="edge" x1="340" y1="150" x2="185" y2="72"  stroke="#7070c0" stroke-width="1"   opacity="0.35"/>
  <line class="edge" x1="340" y1="150" x2="200" y2="200" stroke="#7070c0" stroke-width="1"   opacity="0.35"/>
  <line class="edge" x1="340" y1="150" x2="460" y2="80"  stroke="#7070c0" stroke-width="1"   opacity="0.35"/>
  <line class="edge" x1="340" y1="150" x2="480" y2="210" stroke="#7070c0" stroke-width="1"   opacity="0.35"/>
  <line class="edge" x1="340" y1="150" x2="340" y2="255" stroke="#7070c0" stroke-width="1"   opacity="0.35"/>
  <line class="edge" x1="340" y1="150" x2="110" y2="148" stroke="#7070c0" stroke-width="0.8" opacity="0.3"/>
  <line class="edge" x1="340" y1="150" x2="570" y2="145" stroke="#7070c0" stroke-width="0.8" opacity="0.3"/>
  <line class="edge" x1="185" y1="72"  x2="110" y2="148" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="185" y1="72"  x2="270" y2="38"  stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="460" y1="80"  x2="570" y2="145" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="460" y1="80"  x2="415" y2="38"  stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="200" y1="200" x2="110" y2="148" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="200" y1="200" x2="148" y2="258" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="200" y1="200" x2="270" y2="262" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="480" y1="210" x2="570" y2="145" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="480" y1="210" x2="532" y2="262" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="480" y1="210" x2="410" y2="262" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="340" y1="255" x2="270" y2="262" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="340" y1="255" x2="410" y2="262" stroke="#7070c0" stroke-width="0.7" opacity="0.25"/>
  <line class="edge" x1="110" y1="148" x2="62"  y2="210" stroke="#7070c0" stroke-width="0.6" opacity="0.2"/>
  <line class="edge" x1="570" y1="145" x2="618" y2="210" stroke="#7070c0" stroke-width="0.6" opacity="0.2"/>
  <line class="edge" x1="270" y1="38"  x2="415" y2="38"  stroke="#7070c0" stroke-width="0.6" opacity="0.2"/>
  <line class="edge" x1="270" y1="38"  x2="185" y2="72"  stroke="#7070c0" stroke-width="0.6" opacity="0.2"/>
  <line class="edge" x1="110" y1="148" x2="52"  y2="100" stroke="#7070c0" stroke-width="0.5" opacity="0.2"/>
  <line class="edge" x1="570" y1="145" x2="628" y2="100" stroke="#7070c0" stroke-width="0.5" opacity="0.2"/>
  <line class="edge" x1="270" y1="38"  x2="340" y2="18"  stroke="#7070c0" stroke-width="0.5" opacity="0.2"/>
  <line class="edge" x1="415" y1="38"  x2="340" y2="18"  stroke="#7070c0" stroke-width="0.5" opacity="0.2"/>

  <!-- animated edges -->
  <line class="edge flow"  x1="340" y1="150" x2="185" y2="72"  stroke="#a090ff" stroke-width="1.5" stroke-dasharray="12,8" opacity="0.7"/>
  <line class="edge flow2" x1="340" y1="150" x2="480" y2="210" stroke="#90c8ff" stroke-width="1.5" stroke-dasharray="12,8" opacity="0.7"/>
  <line class="edge flow3" x1="340" y1="150" x2="340" y2="255" stroke="#a0f0d0" stroke-width="1.5" stroke-dasharray="12,8" opacity="0.6"/>
  <line class="edge flow"  x1="185" y1="72"  x2="110" y2="148" stroke="#c0a0ff" stroke-width="1"   stroke-dasharray="10,8" opacity="0.55"/>
  <line class="edge flow2" x1="460" y1="80"  x2="570" y2="145" stroke="#80d8ff" stroke-width="1"   stroke-dasharray="10,8" opacity="0.55"/>
  <line class="edge flow3" x1="200" y1="200" x2="148" y2="258" stroke="#a0f0d0" stroke-width="1"   stroke-dasharray="10,8" opacity="0.5"/>
  <line class="edge flow"  x1="480" y1="210" x2="532" y2="262" stroke="#90c8ff" stroke-width="1"   stroke-dasharray="10,8" opacity="0.5"/>

  <!-- hub node -->
  <circle cx="340" cy="150" r="13" fill="#7b68ee" opacity="0.95"/>
  <circle cx="340" cy="150" r="17" fill="none" stroke="#a090ff" stroke-width="1" opacity="0.4" class="pulse"/>

  <!-- hub label -->
  <text x="340" y="126" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#a090ff" opacity="0.9">Brain</text>

  <!-- primary nodes -->
  <circle cx="185" cy="72"  r="8" fill="#6a5acd" class="pulse2"/>
  <circle cx="460" cy="80"  r="8" fill="#5b7fe0" class="pulse3"/>
  <circle cx="200" cy="200" r="8" fill="#7068d0" class="pulse"/>
  <circle cx="480" cy="210" r="8" fill="#5890d8" class="pulse2"/>
  <circle cx="340" cy="255" r="8" fill="#60b8a0" class="pulse3"/>
  <circle cx="110" cy="148" r="7" fill="#6a5acd" class="pulse3"/>
  <circle cx="570" cy="145" r="7" fill="#5b7fe0" class="pulse"/>

  <!-- secondary nodes -->
  <circle cx="270" cy="38"  r="5" fill="#9080e0" class="pulse2"/>
  <circle cx="415" cy="38"  r="5" fill="#7090d8" class="pulse"/>
  <circle cx="148" cy="258" r="5" fill="#80b0a0" class="pulse3"/>
  <circle cx="270" cy="262" r="5" fill="#70a898" class="pulse2"/>
  <circle cx="410" cy="262" r="5" fill="#60c0a8" class="pulse"/>
  <circle cx="532" cy="262" r="5" fill="#6888d0" class="pulse3"/>

  <!-- tertiary nodes -->
  <circle cx="62"  cy="210" r="4" fill="#8878c8" class="pulse"/>
  <circle cx="618" cy="210" r="4" fill="#6080c8" class="pulse2"/>
  <circle cx="52"  cy="100" r="3" fill="#7868b8" opacity="0.6" class="pulse3"/>
  <circle cx="628" cy="100" r="3" fill="#5878b8" opacity="0.6" class="pulse"/>
  <circle cx="340" cy="18"  r="3" fill="#9080d0" opacity="0.6" class="pulse2"/>
</svg>
